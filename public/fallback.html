<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>troddit - You are offline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #1a1a1b;
            color: #d7dadc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background-color: #384659;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ffffff;
        }
        
        .offline-message {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 12px;
            color: #ff4500;
        }
        
        .description {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 32px;
            color: #818384;
        }
        
        .retry-button {
            background-color: #ff4500;
            color: #ffffff;
            border: none;
            border-radius: 24px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            min-width: 120px;
        }
        
        .retry-button:hover {
            background-color: #e03d00;
        }
        
        .retry-button:active {
            transform: translateY(1px);
        }
        
        @media (max-width: 480px) {
            .logo {
                width: 64px;
                height: 64px;
                font-size: 24px;
                margin-bottom: 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .offline-message {
                font-size: 18px;
            }
            
            .description {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            t
        </div>
        <h1>troddit</h1>
        <div class="offline-message">You are offline</div>
        <p class="description">
            You need an internet connection to browse Reddit. Please check your connection and try again.
        </p>
        <button class="retry-button" onclick="tryAgain()">Try Again</button>
    </div>
    
    <script>
        function tryAgain() {
            window.location.reload();
        }
        
        // Auto-retry when connection is restored
        window.addEventListener('online', function() {
            window.location.reload();
        });
    </script>
</body>
</html>
