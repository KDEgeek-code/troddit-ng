version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-troddit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-troddit}
      POSTGRES_DB: ${POSTGRES_DB:-troddit}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-troddit} -d ${POSTGRES_DB:-troddit}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-5432}:5432"

  app: 
    image: troddit
    build:
      context: .
      dockerfile: Dockerfile
    ports: 
      - 3000:3000
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-troddit}:${POSTGRES_PASSWORD:-troddit}@db:5432/${POSTGRES_DB:-troddit}
      - PGSSLMODE=${PGSSLMODE:-disable}  # SSL disabled for local development only - enable in production
    depends_on:
      db:
        condition: service_healthy


volumes:
  pgdata:
